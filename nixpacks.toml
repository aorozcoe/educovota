[phases.setup]
nixPkgs = ["...", "php84Extensions.intl", "php84Extensions.zip"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-scripts --no-interaction", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan migrate --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
